services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: aiboard
      POSTGRES_PASSWORD: aiboard
      POSTGRES_DB: aiboard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiboard"]
      interval: 2s
      timeout: 3s
      retries: 10

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "postgres://aiboard:aiboard@db:5432/aiboard?sslmode=disable"
      PORT: "8080"
      UPLOAD_DIR: "/data/uploads"
    volumes:
      - uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
