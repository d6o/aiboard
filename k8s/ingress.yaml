apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aiboard
  namespace: aiboard
  annotations:
    # Uncomment for cert-manager TLS:
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  rules:
    - host: aiboard.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aiboard
                port:
                  number: 80
  # Uncomment for TLS:
  # tls:
  #   - hosts:
  #       - aiboard.example.com
  #     secretName: aiboard-tls
