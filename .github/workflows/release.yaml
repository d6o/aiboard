name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

  release:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version and create release
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"

          VERSION="${LATEST_TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          if git rev-parse "$LATEST_TAG" >/dev/null 2>&1; then
            COMMITS=$(git log "${LATEST_TAG}..HEAD" --pretty=format:"%s|%h" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"%s|%h" --no-merges)
          fi

          if [ -z "$COMMITS" ]; then
            echo "No new commits since $LATEST_TAG"
            exit 0
          fi

          BUMP="none"
          FEATURES=""
          FIXES=""

          while IFS= read -r line; do
            MSG="${line%%|*}"
            HASH="${line##*|}"
            DESC=$(echo "$MSG" | sed -E 's/^[a-z]+(\([^)]*\))?!?:[[:space:]]*//')

            if echo "$MSG" | grep -qE '^[a-z]+(\([^)]*\))?!:' || echo "$MSG" | grep -q 'BREAKING CHANGE'; then
              BUMP="major"
              FEATURES="${FEATURES}\n- ${DESC} (${HASH})"
              continue
            fi

            case "$MSG" in
              feat:*|feat\(*)
                [ "$BUMP" != "major" ] && BUMP="minor"
                FEATURES="${FEATURES}\n- ${DESC} (${HASH})"
                ;;
              fix:*|fix\(*)
                [ "$BUMP" = "none" ] && BUMP="patch"
                FIXES="${FIXES}\n- ${DESC} (${HASH})"
                ;;
              docs:*|chore:*|ci:*|refactor:*|test:*|style:*|build:*|perf:*)
                ;;
              *)
                ;;
            esac
          done <<< "$COMMITS"

          if [ "$BUMP" = "none" ]; then
            echo "No releasable commits found"
            exit 0
          fi

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEXT_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Next version: $NEXT_TAG ($BUMP bump)"
          echo "tag=$NEXT_TAG" >> "$GITHUB_OUTPUT"

          CHANGELOG="## What's Changed\n"

          if [ -n "$FEATURES" ]; then
            CHANGELOG="$CHANGELOG\n### Features\n$FEATURES\n"
          fi

          if [ -n "$FIXES" ]; then
            CHANGELOG="$CHANGELOG\n### Fixes\n$FIXES\n"
          fi

          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            CHANGELOG="$CHANGELOG\n**Full Changelog**: https://github.com/${{ github.repository }}/commits/${NEXT_TAG}"
          else
            CHANGELOG="$CHANGELOG\n**Full Changelog**: https://github.com/${{ github.repository }}/compare/${LATEST_TAG}...${NEXT_TAG}"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEXT_TAG" -m "Release $NEXT_TAG"
          git push origin "$NEXT_TAG"

          printf '%b' "$CHANGELOG" | gh release create "$NEXT_TAG" \
            --title "$NEXT_TAG" \
            --notes-file - \
            --verify-tag

  docker:
    needs: release
    if: needs.release.outputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          TAG="${{ needs.release.outputs.tag }}"
          VERSION="${TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          IMG=$(echo "${{ env.IMAGE }}" | tr '[:upper:]' '[:lower:]')

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --tag "${IMG}:${VERSION}" \
            --tag "${IMG}:${MAJOR}.${MINOR}" \
            --tag "${IMG}:${MAJOR}" \
            --tag "${IMG}:latest" \
            --push \
            .
