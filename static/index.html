<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIBoard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>AIBoard</h1>
        <div class="header-actions">
            <div class="user-selector">
                <label for="current-user">Acting as:</label>
                <select id="current-user"></select>
            </div>
            <div class="notification-bell" id="notification-bell">
                <span class="bell-icon">&#128276;</span>
                <span class="badge" id="notification-badge" style="display:none">0</span>
                <div class="notification-dropdown" id="notification-dropdown">
                    <div class="notif-header">
                        <strong>Notifications</strong>
                        <button id="mark-all-read">Mark all read</button>
                    </div>
                    <div id="notification-list"></div>
                </div>
            </div>
            <button class="btn btn-primary" id="new-card-btn">+ New Card</button>
        </div>
    </header>

    <main class="board">
        <div class="column" data-column="todo">
            <div class="column-header"><h2>Todo</h2><span class="count" id="count-todo">0</span></div>
            <div class="card-list" id="list-todo"></div>
        </div>
        <div class="column" data-column="doing">
            <div class="column-header"><h2>Doing</h2><span class="count" id="count-doing">0</span></div>
            <div class="card-list" id="list-doing"></div>
        </div>
        <div class="column" data-column="done">
            <div class="column-header"><h2>Done</h2><span class="count" id="count-done">0</span></div>
            <div class="card-list" id="list-done"></div>
        </div>
    </main>

    <div class="modal-overlay" id="modal-overlay" style="display:none">
        <div class="modal" id="card-modal">
            <div class="modal-header">
                <h2 id="modal-title">New Card</h2>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="card-id">
                <div class="form-group">
                    <label for="card-title">Title *</label>
                    <input type="text" id="card-title" required>
                </div>
                <div class="form-group">
                    <label for="card-description">Description</label>
                    <textarea id="card-description" rows="3"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="card-priority">Priority (1-5)</label>
                        <select id="card-priority">
                            <option value="1">1 - Highest</option>
                            <option value="2">2 - High</option>
                            <option value="3" selected>3 - Medium</option>
                            <option value="4">4 - Low</option>
                            <option value="5">5 - Lowest</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="card-column">Column</label>
                        <select id="card-column">
                            <option value="todo">Todo</option>
                            <option value="doing">Doing</option>
                            <option value="done">Done</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="card-reporter">Reporter *</label>
                        <select id="card-reporter"></select>
                    </div>
                    <div class="form-group">
                        <label for="card-assignee">Assignee *</label>
                        <select id="card-assignee"></select>
                    </div>
                </div>

                <div id="card-detail-section" style="display:none">
                    <div class="section">
                        <h3>Tags</h3>
                        <div id="card-tags" class="tag-list"></div>
                        <div class="tag-add">
                            <select id="tag-select"></select>
                            <button class="btn btn-sm" id="add-tag-btn">Add Tag</button>
                        </div>
                    </div>

                    <div class="section">
                        <h3>Subtasks <span id="subtask-progress"></span></h3>
                        <div id="subtask-list"></div>
                        <div class="subtask-add">
                            <input type="text" id="new-subtask-title" placeholder="New subtask...">
                            <button class="btn btn-sm" id="add-subtask-btn">Add</button>
                        </div>
                    </div>

                    <div class="section">
                        <h3>Comments</h3>
                        <div id="comment-list"></div>
                        <div class="comment-add">
                            <div class="mention-container">
                                <textarea id="new-comment" rows="2" placeholder="Add a comment... Use @name to mention"></textarea>
                                <div class="mention-dropdown" id="mention-dropdown" style="display:none"></div>
                            </div>
                            <button class="btn btn-sm" id="add-comment-btn">Comment</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-danger" id="delete-card-btn" style="display:none">Delete</button>
                <button class="btn btn-primary" id="save-card-btn">Save</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
